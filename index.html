<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>독서 쿠폰</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --sky:#89C4E1;--sky-l:#EAF5FB;--sky-d:#4A9EC4;
  --purple:#B09ED6;--purple-l:#F2EEFB;--purple-d:#8B76C2;
  --mint-l:#EAF7F4;--mint-d:#4EB8A6;
  --gray-l:#F2F4F6;--gray-d:#6E7A84;
  --green:#5BBFA8;--red:#F08080;--yellow-l:#FDF8EC;--yellow-d:#C9A23A;
  --bg:#F8F9FB;--card:#fff;--border:#ECEEF2;
  --text:#2C3A35;--sub:#9AA5A0;
  --r:18px;--rs:12px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg);display:flex;justify-content:center}
#app{width:100%;max-width:420px;min-height:100dvh;background:var(--bg);display:flex;flex-direction:column}
#top-bar{display:flex;align-items:center;gap:10px;padding:16px 20px 12px;flex-shrink:0}
.app-title{flex:1;font-size:17px;font-weight:700;color:var(--text)}
.kid-tabs{display:flex;gap:6px}
.kid-btn{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);font-size:13px;font-weight:500;cursor:pointer;color:var(--sub);-webkit-tap-highlight-color:rgba(0,0,0,.1)}
.kid-btn.k0.active{border-color:var(--sky-d);background:var(--sky-d);color:#fff}
.kid-btn.k1.active{border-color:var(--purple-d);background:var(--purple-d);color:#fff}
.back-btn{width:36px;height:36px;border:1.5px solid var(--border);background:var(--card);border-radius:12px;cursor:pointer;color:var(--text);display:flex;align-items:center;justify-content:center}
.back-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.home-link{font-size:13px;font-weight:500;color:var(--sub);background:none;border:none;cursor:pointer}
#body{flex:1;overflow-y:auto;padding-bottom:88px}
#nav-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:420px;background:rgba(255,255,255,.94);backdrop-filter:blur(16px);border-top:1px solid var(--border);display:flex;z-index:10;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;padding:10px 0 8px;font-size:11px;font-weight:500;color:var(--sub);border:none;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
.nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.nav-btn.active{color:var(--sky-d)}
.bal-wrap{display:flex;gap:10px;margin:4px 20px 0}
.bal-card{flex:1;border-radius:22px;padding:20px 18px;color:#fff;cursor:pointer;transition:box-shadow .2s,opacity .2s;user-select:none}
.bal-card.kid0{background:linear-gradient(135deg,#B8DCF0,var(--sky))}
.bal-card.kid1{background:linear-gradient(135deg,#CFC0E8,var(--purple))}
.bal-card.dim{opacity:.8}
.bal-card.active-card{box-shadow:0 6px 20px rgba(0,0,0,.13)}
.bal-who{font-size:12px;font-weight:600;opacity:.88;margin-bottom:4px}
.bal-amount{font-size:22px;font-weight:700;letter-spacing:-.5px}
.bal-count{font-size:11px;opacity:.72;margin-top:4px}
.curr-book-wrap{display:flex;gap:10px;margin:10px 20px 0}
.curr-book-card{flex:1;background:var(--card);border-radius:14px;padding:12px 14px;box-shadow:0 1px 4px rgba(0,0,0,.05);border:1.5px solid var(--border)}
.curr-book-label{font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}
.curr-book-title{font-size:13px;font-weight:600;color:var(--text);line-height:1.4}
.curr-book-empty{font-size:12px;color:var(--sub)}
.curr-book-edit{font-size:11px;color:var(--sky-d);cursor:pointer;margin-top:4px;background:none;border:none;font-weight:500;padding:0;font-family:inherit}
.action-row{display:flex;gap:8px;margin:12px 20px 0}
.action-btn{flex:1;padding:14px 0 12px;border-radius:var(--r);border:none;font-size:11px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:7px}
.action-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.action-btn.reading{background:#DFF5EF;color:#6BBFAD}
.action-btn.income{background:var(--gray-l);color:var(--gray-d)}
.action-btn.spend{background:var(--purple-l);color:#A898D4}
.action-btn.transfer{background:var(--sky-l);color:var(--sky-d)}
.sec-title{font-size:11px;font-weight:700;color:var(--sub);margin:18px 20px 8px;letter-spacing:.6px;text-transform:uppercase}
.rec-item{padding:12px 20px;border-bottom:1px solid var(--border)}
.rec-row{display:flex;align-items:center;gap:11px}
.rec-bubble{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rec-bubble svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.rec-bubble.reading{background:#DFF5EF;color:#6BBFAD}
.rec-bubble.income{background:#EDEEF5;color:#9AA0C4}
.rec-bubble.spend{background:#EDE9F8;color:#A898D4}
.rec-bubble.transfer{background:#E0F1FA;color:#7BBCD8}
.rec-bubble.adjust{background:var(--yellow-l);color:var(--yellow-d)}
.rec-info{flex:1;min-width:0}
.rec-name{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rec-meta{font-size:11px;color:var(--sub);margin-top:2px;display:flex;align-items:center;gap:5px}
.kid-badge{display:inline-block;padding:1px 7px;border-radius:8px;font-size:10px;font-weight:600;color:#fff}
.kid-badge.k0{background:var(--sky)}
.kid-badge.k1{background:var(--purple)}
.rec-right{display:flex;align-items:center;gap:5px;flex-shrink:0}
.rec-amount{font-size:14px;font-weight:700}
.rec-amount.plus{color:var(--green)}
.rec-amount.minus{color:var(--red)}
.rec-action-btn{width:26px;height:26px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center}
.rec-action-btn svg{width:13px;height:13px;stroke:var(--sub);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.rec-action-btn.open{background:var(--mint-l);border-color:var(--mint-d)}
.rec-action-btn.open svg{stroke:var(--mint-d)}
.memo-box{margin:8px 0 2px 51px;padding:10px 13px;background:var(--mint-l);border-radius:10px;font-size:13px;color:#555;line-height:1.7;border-left:3px solid var(--mint-d)}
.edit-panel{margin:10px 0 2px;padding:14px;background:var(--sky-l);border-radius:12px;border:1.5px solid var(--sky);display:flex;flex-direction:column;gap:8px}
.edit-panel input,.edit-panel textarea{width:100%;padding:8px 10px;border-radius:8px;border:1.5px solid var(--border);font-size:14px;font-family:inherit;background:#fff;color:var(--text);outline:none}
.edit-panel textarea{min-height:60px;resize:none;line-height:1.6}
.edit-btns{display:flex;gap:6px}
.edit-save{flex:1;padding:8px;border-radius:8px;background:var(--sky-d);color:#fff;font-size:13px;font-weight:600;border:none;cursor:pointer;font-family:inherit}
.edit-cancel{padding:8px 12px;border-radius:8px;background:var(--border);color:var(--text);font-size:13px;font-weight:600;border:none;cursor:pointer;font-family:inherit}
.edit-del{padding:8px 12px;border-radius:8px;background:#FFF5F5;color:var(--red);font-size:13px;font-weight:600;border:1.5px solid #FFCDD2;cursor:pointer;font-family:inherit}
.empty-msg{text-align:center;color:var(--sub);padding:32px 0;font-size:14px}
.section-card{background:var(--card);border-radius:var(--r);padding:18px;margin:12px 20px 0;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.s-label{font-size:11px;font-weight:700;color:var(--sub);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.type-card{padding:15px 10px;border-radius:var(--rs);border:2px solid var(--border);background:var(--bg);cursor:pointer;text-align:center}
.type-card.selected{border-color:var(--sky-d);background:var(--sky-l)}
.type-card svg{width:25px;height:25px;stroke:var(--gray-d);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;margin:0 auto;display:block}
.type-card.selected svg{stroke:var(--sky-d)}
.t-name{font-size:13px;font-weight:600;margin-top:7px;color:var(--text)}
.t-pts{font-size:12px;color:var(--green);font-weight:600;margin-top:3px}
.qty-row{display:flex;align-items:center;gap:16px}
.qty-btn{width:38px;height:38px;border-radius:50%;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;border:2px solid var(--border);background:var(--bg);color:var(--text)}
.qty-btn.plus{border-color:var(--mint-d);background:var(--mint-d);color:#fff}
.qty-val{font-size:26px;font-weight:700;min-width:32px;text-align:center;color:var(--text)}
.qty-total{font-size:13px;font-weight:600;color:var(--green)}
.transfer-dir{display:flex;gap:10px}
.dir-btn{flex:1;padding:12px;border-radius:var(--rs);border:2px solid var(--border);background:var(--bg);cursor:pointer;text-align:center;font-size:13px;font-weight:600;color:var(--sub)}
.dir-btn.selected{border-color:var(--sky-d);background:var(--sky-l);color:var(--sky-d)}
input[type=text],input[type=number]{width:100%;padding:12px 14px;border-radius:var(--rs);border:1.5px solid var(--border);font-size:15px;font-family:inherit;background:var(--bg);color:var(--text);outline:none}
input:focus{border-color:var(--sky-d)}
textarea{width:100%;padding:12px 14px;border-radius:var(--rs);border:1.5px solid var(--border);font-size:14px;font-family:inherit;background:var(--bg);color:var(--text);outline:none;resize:none;min-height:90px;line-height:1.7}
textarea:focus{border-color:var(--sky-d)}
.primary-btn{display:block;width:calc(100% - 40px);margin:16px 20px 0;padding:15px;border-radius:var(--r);background:linear-gradient(135deg,var(--sky-d),#6AB8D8);color:#fff;font-size:16px;font-weight:700;border:none;cursor:pointer;font-family:inherit}
.tab-row{display:flex;margin:14px 20px 0;background:var(--card);border-radius:12px;padding:4px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.tab-btn{flex:1;padding:8px 0;font-size:13px;font-weight:600;color:var(--sub);border:none;border-radius:9px;background:transparent;cursor:pointer;font-family:inherit}
.tab-btn.active{background:linear-gradient(135deg,var(--sky-d),#6AB8D8);color:#fff}
.chip-row{display:flex;gap:6px;margin:10px 20px 0;flex-wrap:wrap}
.chip{padding:5px 13px;border-radius:20px;font-size:12px;font-weight:500;border:1.5px solid var(--border);background:var(--card);color:var(--sub);cursor:pointer}
.chip.active{border-color:var(--sky-d);background:var(--sky-l);color:var(--sky-d)}
.stat-row{display:flex;gap:10px;margin:10px 20px 0}
.stat-card{flex:1;padding:14px;border-radius:var(--r);background:var(--card);box-shadow:0 1px 4px rgba(0,0,0,.05);text-align:center}
.stat-label{font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.3px}
.stat-val{font-size:22px;font-weight:700;margin-top:4px;color:var(--text)}
.stat-val.green{color:var(--green)}
.settings-group{margin:14px 20px 0}
.kid-card{margin-bottom:14px;padding:18px;border-radius:var(--r);background:var(--card);box-shadow:0 1px 4px rgba(0,0,0,.05)}
.kid-card-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:12px}
.field-label{font-size:11px;font-weight:700;color:var(--sub);margin-bottom:6px;text-transform:uppercase;letter-spacing:.3px}
.cur-balance{font-size:12px;color:var(--sub);margin-top:8px}
.cur-balance b{font-weight:700;color:var(--text)}
.confirm-hint{font-size:12px;color:var(--sub);white-space:nowrap}
.item-row{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--border)}
.item-label{font-size:14px;font-weight:500;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.n-input{width:68px;padding:7px 8px;border-radius:8px;border:1.5px solid var(--border);font-size:14px;text-align:right;font-family:inherit;background:var(--bg);color:var(--text);outline:none;flex-shrink:0}
.n-input:focus{border-color:var(--sky-d)}
.del-btn{padding:5px 10px;border-radius:8px;border:1.5px solid #FFCDD2;background:#FFF5F5;color:var(--red);font-size:12px;font-weight:600;cursor:pointer;flex-shrink:0}
.add-section{margin-top:14px;padding:18px;border-radius:var(--r);background:var(--card);box-shadow:0 1px 4px rgba(0,0,0,.05)}
.add-section-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:10px}
.add-btn{width:100%;padding:12px;border-radius:var(--rs);border:2px dashed var(--sky-l);background:transparent;font-size:14px;font-weight:600;cursor:pointer;color:var(--sky-d);margin-top:10px;font-family:inherit}
.row-unit{font-size:12px;color:var(--sub);flex-shrink:0}
#loading{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:14px}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--sky-d);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:#2C3A35;color:#fff;padding:11px 22px;border-radius:24px;font-size:13px;font-weight:500;opacity:0;transition:opacity .3s;pointer-events:none;z-index:100;white-space:nowrap}
#toast.show{opacity:1}
</style>
</head>

var saving = false;
var editingBook = null;

function fmt(n){ return (n||0).toLocaleString('ko-KR')+'원'; }
function uid(){ return Math.random().toString(36).slice(2,7); }
function cur(){ return stack[stack.length-1]; }
function root(){ return stack[0]; }
function bal(i){ return (st.records[i]||[]).reduce(function(s,r){ return s+(r.type==='spend'?-r.amount:r.amount); },0); }
function nowStr(){
  var d=new Date();
  return {date:d.toLocaleDateString('ko-KR'), time:('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2), ts:d.getTime()};
}
function toast(msg){
  var el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(function(){ el.classList.remove('show'); },2500);
}

function setKidIdx(i){
  kidIdx=i; expandedKey=null; editingKey=null; render();
}

function save(){
  if(saving) return Promise.resolve();
  saving=true;
  return db.collection('app').doc('config').set({
    kids:JSON.parse(JSON.stringify(st.kids)),
    currentBooks:JSON.parse(JSON.stringify(st.currentBooks||['',''])),
    reading:JSON.parse(JSON.stringify(st.reading)),
    chores:JSON.parse(JSON.stringify(st.chores)),
  },{merge:true}).then(function(){
    var ps=[];
    for(var i=0;i<2;i++){
      var clean=(st.records[i]||[]).map(function(r){
        var o={}; for(var k in r) o[k]=(r[k]===undefined?null:r[k]); return o;
      });
      ps.push(db.collection('app').doc('records_'+i).set({list:clean},{merge:true}));
    }
    return Promise.all(ps);
  }).then(function(){ toast('저장됐어요'); saving=false; })
  .catch(function(e){ console.error(e); toast('저장 실패: '+e.message); saving=false; });
}

function push(s){ stack.push(s); form={}; render(); }
function pop(){ if(stack.length>1) stack.pop(); render(); }
function goRoot(s){ stack=[s]; editingKey=null; expandedKey=null; editingBook=null; render(); }

function bubClass(r){
  if(r.icon==='transfer') return 'transfer';
  if(r.label==='잔액 직접 조정') return 'adjust';
  if(r.type==='reading') return 'reading';
  if(r.type==='income') return 'income';
  return 'spend';
}

function recHTML(r, showKid){
  var isSpend=(r.type==='spend');
  var cls=isSpend?'minus':'plus', sign=isSpend?'-':'+';
  var ki=(r._ki!==undefined)?r._ki:(r.kidIdx||0);
  var key=ki+'_'+r._idx;
  var isExp=(expandedKey===key), isEdit=(editingKey===key);
  var hasMemo=(r.memo&&r.memo.trim());
  var isAdj=(r.label==='잔액 직접 조정');
  var bubIcon = r.type==='reading'?(IC[r.icon||'book']||IC.book) : r.type==='income'?IC.star : r.icon==='transfer'?IC.transfer : r.label==='잔액 직접 조정'?IC.adjust : IC.spend;

  var extra='';
  if(isEdit){
    var fields='';
    if(r.type==='reading'){
      fields='<input type="text" placeholder="제목" value="'+(editForm.title||'').replace(/"/g,'&quot;')+'" oninput="editForm.title=this.value"/>'
        +'<textarea placeholder="인상깊었던 내용" oninput="editForm.memo=this.value" style="min-height:55px">'+(editForm.memo||'')+'</textarea>'
        +'<input type="number" placeholder="금액" value="'+(editForm.amount||'')+'" oninput="editForm.amount=this.value"/>';
    } else if(r.type==='spend'){
      fields='<input type="text" placeholder="내용" value="'+(editForm.label||'').replace(/"/g,'&quot;')+'" oninput="editForm.label=this.value"/>'
        +'<input type="number" placeholder="금액" value="'+(editForm.amount||'')+'" oninput="editForm.amount=this.value"/>';
    } else {
      fields='<input type="number" placeholder="금액" value="'+(editForm.amount||'')+'" oninput="editForm.amount=this.value"/>';
    }
    extra='<div class="edit-panel">'+fields+'<div class="edit-btns">'
      +'<button class="edit-save" onclick="saveEdit('+ki+','+r._idx+')">저장</button>'
      +'<button class="edit-cancel" onclick="cancelEdit()">취소</button>'
      +'<button class="edit-del" onclick="deleteRec('+ki+','+r._idx+')">삭제</button>'
      +'</div></div>';
  } else if(hasMemo&&isExp){
    extra='<div class="memo-box">'+r.memo+'</div>';
  }

  return '<div class="rec-item"><div class="rec-row">'
    +'<div class="rec-bubble '+bubClass(r)+'">'+bubIcon+'</div>'
    +'<div class="rec-info">'
    +'<div class="rec-name">'+r.label+(r.qty>1?' ×'+r.qty:'')+(r.title?' · '+r.title:'')+'</div>'
    +'<div class="rec-meta">'+(showKid?'<span class="kid-badge k'+ki+'">'+st.kids[ki]+'</span>':'')
    +'<span>'+r.date+(r.time?' '+r.time:'')+'</span></div></div>'
    +'<div class="rec-right">'
    +'<div class="rec-amount '+cls+'">'+sign+fmt(r.amount)+'</div>'
    +(hasMemo?'<button class="rec-action-btn'+(isExp&&!isEdit?' open':'')+'" onclick="toggleMemo(\''+key+'\')">'+IC.chat+'</button>':'')
    +(!isAdj?'<button class="rec-action-btn'+(isEdit?' open':'')+'" onclick="startEdit('+ki+','+r._idx+')">'+IC.edit+'</button>':'')
    +'</div></div>'+extra+'</div>';
}

function startEdit(ki,idx){
  var r=st.records[ki][idx];
  editForm={title:r.title||'',memo:r.memo||'',amount:r.amount,label:r.label};
  var key=ki+'_'+idx;
  editingKey=(editingKey===key)?null:key;
  expandedKey=null; render();
}
function saveEdit(ki,idx){
  var r=st.records[ki][idx];
  if(r.type==='reading'){r.title=editForm.title||'';r.memo=editForm.memo||'';}
  if(r.type==='spend'){r.label=editForm.label||r.label;}
  r.amount=parseInt(editForm.amount)||r.amount;
  editingKey=null; editForm={};
  save().then(function(){ render(); });
}
function deleteRec(ki,idx){
  st.records[ki].splice(idx,1);
  editingKey=null; editForm={};
  save().then(function(){ render(); });
}
function cancelEdit(){ editingKey=null; editForm={}; render(); }
function toggleMemo(key){ expandedKey=(expandedKey===key)?null:key; editingKey=null; render(); }

function doComplete(i){
  var book=(st.currentBooks||['',''])[i];
  if(!book) return;
  var thick=st.reading.find(function(r){ return r.label==='굵은 책'; });
  var n=nowStr();
  if(thick){
    var rec={type:'reading',label:thick.label,icon:'thick',amount:thick.points,qty:1,memo:'완독: '+book,title:book,date:n.date,time:n.time,ts:n.ts,kidIdx:i};
    st.records[i]=([rec]).concat(st.records[i]||[]);
  }
  st.currentBooks[i]='';
  save().then(function(){ render(); toast('완독 축하해요! 🎉'); });
}

function setBalance(i,v){
  var t=parseInt(v); if(isNaN(t)) return;
  var diff=t-bal(i); if(diff===0) return;
  var n=nowStr();
  var rec={type:diff>0?'income':'spend',label:'잔액 직접 조정',icon:'adjust',amount:Math.abs(diff),date:n.date,time:n.time,ts:n.ts,kidIdx:i};
  st.records[i]=([rec]).concat(st.records[i]||[]);
  save().then(function(){ render(); });
}

function editBook(i){ editingBook=i; render(); }
function cancelBook(){ editingBook=null; render(); }
function saveBook(i){
  var el=document.getElementById('cb'+i);
  if(el){ st.currentBooks[i]=el.value; save().then(function(){ editingBook=null; render(); }); }
}

// ── 렌더
function renderTopBar(){
  var s=cur(), isSub=['reading','income','spend','transfer'].indexOf(s)>=0;
  var titles={reading:'독서 기록',income:'수입',spend:'지출',transfer:'송금'};
  if(isSub){
    document.getElementById('top-bar').innerHTML=
      '<button class="back-btn" onclick="pop()">'+IC.back+'</button>'
      +'<span style="flex:1;font-size:16px;font-weight:700;color:var(--text)">'+titles[s]+'</span>'
      +'<button class="home-link" onclick="goRoot(\'home\')">홈으로</button>';
  } else {
    document.getElementById('top-bar').innerHTML=
      '<span class="app-title">독서 쿠폰</span>'
      +'<div class="kid-tabs">'
      +'<button class="kid-btn k0 '+(kidIdx===0?'active':'')+'" id="kt0">'+st.kids[0]+'</button>'
      +'<button class="kid-btn k1 '+(kidIdx===1?'active':'')+'" id="kt1">'+st.kids[1]+'</button>'
      +'</div>';
    // 탭 클릭 이벤트 직접 연결
    var kt0=document.getElementById('kt0');
    var kt1=document.getElementById('kt1');
    if(kt0) kt0.addEventListener('click', function(){ setKidIdx(0); });
    if(kt1) kt1.addEventListener('click', function(){ setKidIdx(1); });
  }
}

function renderNavBar(){
  var isSub=['reading','income','spend','transfer'].indexOf(cur())>=0;
  document.querySelectorAll('.nav-btn').forEach(function(b){ b.classList.toggle('active',!isSub&&b.dataset.s===root()); });
}

function renderHome(){
  var books=st.currentBooks||['',''];
  var recs=(st.records[kidIdx]||[]).map(function(r,idx){ return Object.assign({},r,{_ki:kidIdx,_idx:idx}); });

  var bookCards=st.kids.map(function(k,i){
    if(editingBook===i){
      return '<div class="curr-book-card">'
        +'<div class="curr-book-label">'+k+' · 읽는 중</div>'
        +'<input type="text" id="cb'+i+'" value="'+(books[i]||'').replace(/"/g,'&quot;')+'" placeholder="책 제목 입력" style="font-size:13px;padding:6px 8px;margin-top:2px"/>'
        +'<div style="display:flex;gap:6px;margin-top:6px">'
        +'<button onclick="saveBook('+i+')" style="flex:1;padding:6px;border-radius:8px;background:var(--sky-d);color:#fff;font-size:12px;font-weight:600;border:none;cursor:pointer;font-family:inherit">저장</button>'
        +'<button onclick="cancelBook()" style="padding:6px 10px;border-radius:8px;background:var(--border);color:var(--text);font-size:12px;font-weight:600;border:none;cursor:pointer;font-family:inherit">취소</button>'
        +'</div></div>';
    }
    var completeBtn=books[i]
      ?'<button onclick="doComplete('+i+')" style="margin-top:6px;width:100%;padding:6px;border-radius:8px;background:var(--green);color:#fff;font-size:11px;font-weight:600;border:none;cursor:pointer;font-family:inherit">✓ 완독!</button>':'';
    return '<div class="curr-book-card">'
      +'<div class="curr-book-label">'+k+' · 읽는 중</div>'
      +(books[i]?'<div class="curr-book-title">'+books[i]+'</div>':'<div class="curr-book-empty">등록된 책이 없어요</div>')
      +'<button class="curr-book-edit" onclick="editBook('+i+')">수정</button>'
      +completeBtn+'</div>';
  }).join('');

  var recentHTML=recs.length===0
    ?'<div class="empty-msg">아직 기록이 없어요</div>'
    :recs.slice(0,6).map(function(r){ return recHTML(r,false); }).join('');

  // 잔액 카드 HTML (onclick 인라인으로 단순하게)
  var balCards=
    '<div class="bal-card kid0 '+(kidIdx===0?'active-card':'dim')+'" onclick="setKidIdx(0)">'
    +'<div class="bal-who">'+st.kids[0]+'</div>'
    +'<div class="bal-amount">'+fmt(bal(0))+'</div>'
    +'<div class="bal-count">'+(st.records[0]||[]).length+'건의 기록</div></div>'
    +'<div class="bal-card kid1 '+(kidIdx===1?'active-card':'dim')+'" onclick="setKidIdx(1)">'
    +'<div class="bal-who">'+st.kids[1]+'</div>'
    +'<div class="bal-amount">'+fmt(bal(1))+'</div>'
    +'<div class="bal-count">'+(st.records[1]||[]).length+'건의 기록</div></div>';

  return '<div class="bal-wrap">'+balCards+'</div>'
    +'<div class="curr-book-wrap">'+bookCards+'</div>'
    +'<div class="action-row">'
    +'<button class="action-btn reading" onclick="push(\'reading\')">'+IC.book+'독서</button>'
    +'<button class="action-btn income" onclick="push(\'income\')">'+IC.star+'수입</button>'
    +'<button class="action-btn spend" onclick="push(\'spend\')">'+IC.spend+'지출</button>'
    +'<button class="action-btn transfer" onclick="push(\'transfer\')">'+IC.transfer+'송금</button>'
    +'</div>'
    +'<div class="sec-title">'+st.kids[kidIdx]+' 최근 내역</div>'+recentHTML;
}

function renderReading(){
  var qty=form.qty||1;
  var sel=form.typeId?st.reading.find(function(r){ return r.id===form.typeId; }):null;
  var pts=sel?sel.points:0;
  var cards=st.reading.map(function(r){
    var s=(form.typeId===r.id);
    var ico=IC[r.icon||'book']||IC.book;
    return '<div class="type-card'+(s?' selected':'')+'" onclick="form.typeId=\''+r.id+'\';render()">'+ico
      +'<div class="t-name">'+r.label+'</div><div class="t-pts">+'+fmt(r.points)+'</div></div>';
  }).join('');
  return '<div class="section-card"><div class="s-label">종류 선택</div><div class="type-grid">'+cards+'</div></div>'
    +'<div class="section-card"><div class="s-label">개수</div><div class="qty-row">'
    +'<button class="qty-btn" onclick="form.qty=Math.max(1,(form.qty||1)-1);render()">−</button>'
    +'<span class="qty-val">'+qty+'</span>'
    +'<button class="qty-btn plus" onclick="form.qty=(form.qty||1)+1;render()">+</button>'
    +(pts?'<span class="qty-total">= +'+fmt(pts*qty)+'</span>':'')
    +'</div></div>'
    +'<div class="section-card"><div class="s-label">제목 (선택)</div>'
    +'<input type="text" placeholder="예: 해리포터" value="'+(form.title||'').replace(/"/g,'&quot;')+'" oninput="form.title=this.value"/></div>'
    +'<div class="section-card"><div class="s-label">인상깊었던 내용 (선택)</div>'
    +'<textarea placeholder="기억에 남는 내용을 적어봐요" oninput="form.memo=this.value">'+(form.memo||'')+'</textarea></div>'
    +'<button class="primary-btn" onclick="doReading()">저장하기</button>';
}

function doReading(){
  if(!form.typeId){ toast('종류를 선택해주세요'); return; }
  var t=st.reading.find(function(r){ return r.id===form.typeId; });
  var qty=form.qty||1, n=nowStr();
  var rec={type:'reading',label:t.label,icon:t.icon||'book',amount:t.points*qty,qty:qty,memo:form.memo||'',title:form.title||'',date:n.date,time:n.time,ts:n.ts,kidIdx:kidIdx};
  st.records[kidIdx]=([rec]).concat(st.records[kidIdx]||[]);
  form={}; save().then(function(){ goRoot('home'); });
}

function renderIncome(){
  var selected=form.selectedChores||[];
  var cards=st.chores.map(function(c){
    var s=selected.indexOf(c.id)>=0;
    return '<div class="type-card'+(s?' selected':'')+'" onclick="toggleChore(\''+c.id+'\')">'+IC.star
      +'<div class="t-name">'+c.label+'</div><div class="t-pts">+'+fmt(c.points)+'</div></div>';
  }).join('');
  var total=selected.reduce(function(s,id){ var c=st.chores.find(function(c){ return c.id===id; }); return s+(c?c.points:0); },0);
  var bar=selected.length>0
    ?'<div style="margin:10px 20px 0;padding:12px 16px;background:var(--sky-l);border-radius:12px;display:flex;justify-content:space-between;align-items:center">'
      +'<span style="font-size:13px;font-weight:500;color:var(--text)">'+selected.length+'개 선택</span>'
      +'<span style="font-size:15px;font-weight:700;color:var(--green)">+'+fmt(total)+'</span></div>':'';
  return '<div class="section-card"><div class="s-label">항목 선택 (중복 가능)</div><div class="type-grid">'+cards+'</div></div>'
    +bar+'<button class="primary-btn" onclick="doIncome()">저장하기</button>';
}

function toggleChore(id){
  if(!form.selectedChores) form.selectedChores=[];
  var i=form.selectedChores.indexOf(id);
  if(i>=0) form.selectedChores.splice(i,1); else form.selectedChores.push(id);
  render();
}

function doIncome(){
  var sel=form.selectedChores||[];
  if(sel.length===0){ toast('항목을 선택해주세요'); return; }
  var n=nowStr();
  sel.forEach(function(id){
    var c=st.chores.find(function(c){ return c.id===id; }); if(!c) return;
    var rec={type:'income',label:c.label,icon:'star',amount:c.points,date:n.date,time:n.time,ts:n.ts,kidIdx:kidIdx};
    st.records[kidIdx]=([rec]).concat(st.records[kidIdx]||[]);
  });
  form={}; save().then(function(){ goRoot('home'); });
}

function renderSpend(){
  return '<div class="section-card"><div class="s-label">금액</div>'
    +'<input type="number" id="spend-amount" placeholder="예: 3000" value="'+(form.amount||'')+'" oninput="form.amount=this.value.trim()"/></div>'
    +'<div class="section-card"><div class="s-label">어디에 썼나요</div>'
    +'<input type="text" id="spend-memo" placeholder="예: 편의점" value="'+(form.memo||'').replace(/"/g,'&quot;')+'" oninput="form.memo=this.value.trim()"/></div>'
    +'<button class="primary-btn" onclick="doSpend()">저장하기</button>';
}

function doSpend(){
  var amtEl=document.getElementById('spend-amount');
  var memoEl=document.getElementById('spend-memo');
  if(amtEl) form.amount=amtEl.value.trim();
  if(memoEl) form.memo=memoEl.value.trim();
  var amt=parseInt(form.amount);
  if(!form.amount||isNaN(amt)||amt<=0){ toast('금액을 입력해주세요'); return; }
  if(!form.memo){ toast('어디에 썼는지 입력해주세요'); return; }
  var n=nowStr();
  var rec={type:'spend',label:form.memo,icon:'spend',amount:amt,date:n.date,time:n.time,ts:n.ts,kidIdx:kidIdx};
  st.records[kidIdx]=([rec]).concat(st.records[kidIdx]||[]);
  form={}; save().then(function(){ goRoot('home'); });
}

function renderTransfer(){
  var dirs=st.kids.map(function(k,i){
    var s=(form.dir===i);
    return '<div class="dir-btn'+(s?' selected':'')+'" onclick="form.dir='+i+';render()">'
      +'<div style="font-size:11px;color:'+(s?'var(--sky-d)':'var(--sub)')+';margin-bottom:3px">보내는 사람</div>'
      +'<div style="font-size:14px;font-weight:700;color:var(--text)">'+k+'</div>'
      +'<div style="font-size:11px;color:'+(s?'var(--sky-d)':'var(--sub)')+';margin-top:2px">→ '+st.kids[1-i]+'</div></div>';
  }).join('');
  return '<div class="section-card"><div class="s-label">누가 보내나요?</div>'
    +'<div class="transfer-dir">'+dirs+'</div></div>'
    +'<div class="section-card"><div class="s-label">금액</div>'
    +'<input type="number" placeholder="예: 1000" value="'+(form.amount||'')+'" oninput="form.amount=this.value"/></div>'
    +'<button class="primary-btn" onclick="doTransfer()">송금하기</button>';
}

function doTransfer(){
  if(form.dir===undefined||form.dir===null){ toast('보내는 사람을 선택해주세요'); return; }
  if(!form.amount||parseInt(form.amount)<=0){ toast('금액을 입력해주세요'); return; }
  var from=form.dir, to=1-from, amt=parseInt(form.amount), n=nowStr();
  st.records[from]=([{type:'spend',label:st.kids[to]+'에게 송금',icon:'transfer',amount:amt,date:n.date,time:n.time,ts:n.ts,kidIdx:from}]).concat(st.records[from]||[]);
  st.records[to]=([{type:'income',label:st.kids[from]+'에게서 받음',icon:'transfer',amount:amt,date:n.date,time:n.time,ts:n.ts,kidIdx:to}]).concat(st.records[to]||[]);
  form={}; save().then(function(){ goRoot('home'); });
}

function renderHistory(){
  var tabs=[['all','전체'],['reading','독서'],['income','수입'],['spend','지출']];
  var tabsH=tabs.map(function(t){ return '<button class="tab-btn'+(histFilter===t[0]?' active':'')+'" onclick="histFilter=\''+t[0]+'\';readingFilter=null;render()">'+t[1]+'</button>'; }).join('');
  var chipsH='', statsH='';
  if(histFilter==='reading'){
    chipsH='<div class="chip-row"><button class="chip'+(!readingFilter?' active':'')+'" onclick="readingFilter=null;render()">전체</button>'
      +st.reading.map(function(r){ return '<button class="chip'+(readingFilter===r.label?' active':'')+'" onclick="readingFilter=\''+r.label+'\';render()">'+r.label+'</button>'; }).join('')+'</div>';
    var f2=(st.records[kidIdx]||[]).filter(function(r){ return r.type==='reading'&&(!readingFilter||r.label===readingFilter); });
    if(f2.length>0){
      statsH='<div class="stat-row">'
        +'<div class="stat-card"><div class="stat-label">총 횟수</div><div class="stat-val">'+f2.length+'권</div></div>'
        +'<div class="stat-card"><div class="stat-label">적립 금액</div><div class="stat-val green">'+fmt(f2.reduce(function(s,r){ return s+r.amount; },0))+'</div></div></div>';
    }
  }
  var filtered=(st.records[kidIdx]||[]).map(function(r,idx){ return Object.assign({},r,{_ki:kidIdx,_idx:idx}); }).filter(function(r){
    if(histFilter==='all') return true;
    if(histFilter==='reading') return r.type==='reading'&&(!readingFilter||r.label===readingFilter);
    return r.type===histFilter;
  });
  return '<div class="tab-row">'+tabsH+'</div>'+chipsH+statsH
    +'<div style="margin-top:8px">'+(filtered.length===0?'<div class="empty-msg">'+st.kids[kidIdx]+'의 기록이 없어요</div>':filtered.map(function(r){ return recHTML(r,false); }).join(''))+'</div>';
}

function renderSettings(){
  var tabs=[['kids','이름'],['reading','독서'],['chores','수입']];
  var tabsH=tabs.map(function(t){ return '<button class="tab-btn'+(settingsTab===t[0]?' active':'')+'" onclick="settingsTab=\''+t[0]+'\';render()">'+t[1]+'</button>'; }).join('');
  var body='';
  if(settingsTab==='kids'){
    body='<div class="settings-group">'+st.kids.map(function(k,i){
      return '<div class="kid-card"><div class="kid-card-title">'+(i+1)+'번째 아이</div>'
        +'<div class="field-label">이름</div>'
        +'<input type="text" value="'+k+'" oninput="st.kids['+i+']=this.value"/>'
        +'<div class="field-label" style="margin-top:14px">현재 잔액 직접 설정</div>'
        +'<div style="display:flex;gap:8px;align-items:center">'
        +'<input type="number" placeholder="예: 5000" style="flex:1" onblur="setBalance('+i+',this.value);this.value=\'\'"/>'
        +'<span class="confirm-hint">원 입력 후 확인</span></div>'
        +'<div class="cur-balance">현재 잔액: <b>'+fmt(bal(i))+'</b></div></div>';
    }).join('')
    +'<button class="primary-btn" style="margin-left:0;width:100%" onclick="save().then(function(){ toast(\'저장됐어요\'); render(); })">이름 저장</button></div>';
  }
  if(settingsTab==='reading'){
    var rows=st.reading.map(function(r,i){
      return '<div class="item-row">'
        +'<div style="width:32px;height:32px;border-radius:9px;background:#DFF5EF;color:#6BBFAD;display:flex;align-items:center;justify-content:center;flex-shrink:0">'+(IC[r.icon||'book']||IC.book)+'</div>'
        +'<span class="item-label">'+r.label+'</span>'
        +'<input class="n-input" type="number" value="'+r.points+'" oninput="st.reading['+i+'].points=parseInt(this.value)||0"/>'
        +'<span class="row-unit">원</span>'
        +'<button class="del-btn" onclick="st.reading.splice('+i+',1);save().then(function(){ render(); })">삭제</button></div>';
    }).join('');
    body='<div class="settings-group"><div style="background:var(--card);border-radius:var(--r);padding:4px 18px 12px;box-shadow:0 1px 4px rgba(0,0,0,.05)">'+rows+'</div>'
      +'<button class="primary-btn" style="margin:12px 0 0;width:100%" onclick="save().then(function(){ toast(\'저장됐어요\'); })">저장하기</button>'
      +'<div class="add-section"><div class="add-section-title">독서 종류 추가</div>'
      +'<input type="text" placeholder="이름 (예: 만화책)" value="'+newR.label+'" oninput="newR.label=this.value"/>'
      +'<div style="display:flex;gap:8px;margin-top:10px;align-items:center">'
      +'<input class="n-input" type="number" placeholder="금액" value="'+newR.points+'" oninput="newR.points=this.value" style="flex:1;width:auto"/>'
      +'<span class="row-unit">원</span></div>'
      +'<button class="add-btn" onclick="if(newR.label&&newR.points){st.reading.push({id:uid(),label:newR.label,points:parseInt(newR.points),icon:\'book\'});newR={label:\'\',points:\'\'};save().then(function(){ render(); });}">+ 추가하기</button>'
      +'</div></div>';
  }
  if(settingsTab==='chores'){
    var cRows=st.chores.map(function(c,i){
      return '<div class="item-row">'
        +'<div style="width:32px;height:32px;border-radius:9px;background:#EDEEF5;color:#9AA0C4;display:flex;align-items:center;justify-content:center;flex-shrink:0">'+IC.star+'</div>'
        +'<span class="item-label">'+c.label+'</span>'
        +'<input class="n-input" type="number" value="'+c.points+'" oninput="st.chores['+i+'].points=parseInt(this.value)||0"/>'
        +'<span class="row-unit">원</span>'
        +'<button class="del-btn" onclick="st.chores.splice('+i+',1);save().then(function(){ render(); })">삭제</button></div>';
    }).join('');
    body='<div class="settings-group"><div style="background:var(--card);border-radius:var(--r);padding:4px 18px 12px;box-shadow:0 1px 4px rgba(0,0,0,.05)">'+cRows+'</div>'
      +'<button class="primary-btn" style="margin:12px 0 0;width:100%" onclick="save().then(function(){ toast(\'저장됐어요\'); })">저장하기</button>'
      +'<div class="add-section"><div class="add-section-title">수입 항목 추가</div>'
      +'<div style="display:flex;flex-direction:column;gap:8px;margin-top:4px">'
      +'<input type="text" placeholder="항목 이름 (예: 설거지)" value="'+newC.label+'" oninput="newC.label=this.value"/>'
      +'<div style="display:flex;gap:8px;align-items:center">'
      +'<input class="n-input" type="number" placeholder="금액" value="'+newC.points+'" oninput="newC.points=this.value" style="flex:1;width:auto;text-align:left"/>'
      +'<span class="row-unit">원</span></div></div>'
      +'<button class="add-btn" onclick="if(newC.label&&newC.points){st.chores.push({id:uid(),label:newC.label,points:parseInt(newC.points)});newC={label:\'\',points:\'\'};save().then(function(){ render(); });}">+ 추가하기</button>'
      +'</div></div>';
  }
  return '<div class="tab-row">'+tabsH+'</div>'+body;
}

function render(){
  renderTopBar(); renderNavBar();
  var screens={home:renderHome,reading:renderReading,income:renderIncome,spend:renderSpend,transfer:renderTransfer,history:renderHistory,settings:renderSettings};
  var fn=screens[cur()];
  document.getElementById('body').innerHTML=fn?fn():'';
}

function setupSync(){
  db.collection('app').doc('config').onSnapshot(function(snap){
    if(snap&&snap.exists===true){
      var d=snap.data();
      st.kids=d.kids&&d.kids.length?d.kids:DEFAULTS.kids;
      st.currentBooks=d.currentBooks||['',''];
      st.reading=d.reading&&d.reading.length?d.reading:DEFAULTS.reading;
      st.chores=d.chores&&d.chores.length?d.chores:DEFAULTS.chores;
      render();
    }
  });
  for(var i=0;i<2;i++){
    (function(idx){
      db.collection('app').doc('records_'+idx).onSnapshot(function(snap){
        if(snap&&snap.exists===true) st.records[idx]=snap.data().list||[];
        render();
      });
    })(i);
  }
}

db.collection('app').doc('config').get().then(function(cfg){
  if(cfg&&cfg.exists===true){
    var d=cfg.data();
    st.kids=d.kids&&d.kids.length?d.kids:DEFAULTS.kids;
    st.currentBooks=d.currentBooks||['',''];
    st.reading=d.reading&&d.reading.length?d.reading:DEFAULTS.reading;
    st.chores=d.chores&&d.chores.length?d.chores:DEFAULTS.chores;
  } else {
    db.collection('app').doc('config').set({kids:st.kids,currentBooks:st.currentBooks,reading:st.reading,chores:st.chores});
  }
  var ps=[];
  for(var i=0;i<2;i++){
    ps.push((function(idx){
      return db.collection('app').doc('records_'+idx).get().then(function(r){
        st.records[idx]=(r&&r.exists===true)?(r.data().list||[]):[];
      });
    })(i));
  }
  return Promise.all(ps);
}).then(function(){
  setupSync();
  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='flex';
  render();
}).catch(function(e){
  console.error('init 오류:',e);
  document.getElementById('loading').innerHTML='<div style="font-size:14px;color:var(--red)">불러오기 실패: '+e.message+'</div>';
});
</script>
</body>
</html>
